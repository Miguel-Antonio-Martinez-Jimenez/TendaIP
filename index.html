<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Tenda Custom</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: #111827;
    border-bottom: 2px solid #0d6efd;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(13,110,253,0.2);
}

.btn-blue {
    background: #0d6efd;
    color: white;
    border: none;
}

.btn-blue:hover {
    background: #0b5ed7;
}

.status {
    font-weight: bold;
}

.online {
    color: #00ff9c;
}

.offline {
    color: #ff4d4d;
}
</style>

</head>
<body>

<nav class="navbar p-3">
    <div class="container-fluid">
        <h4 class="text-primary">⚡ Panel Router Tenda</h4>
    </div>
</nav>

<div class="container mt-4">

    <div class="row g-4">

        <!-- Estado -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>Estado del Router</h5>
                <p>IP: <span id="ip">192.168.1.67</span></p>
                <p class="status" id="estado">Desconocido</p>

                <button class="btn btn-blue w-100" onclick="checkStatus()">
                    Verificar conexión
                </button>
            </div>
        </div>

        <!-- Acciones -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>Acciones</h5>

                <button class="btn btn-blue w-100 mb-2" onclick="openRouter()">
                    Abrir Router
                </button>

                <button class="btn btn-danger w-100" onclick="restartRouter()">
                    Reiniciar (simulado)
                </button>
            </div>
        </div>

        <!-- Info -->
        <div class="col-12">
            <div class="card p-4">
                <h5>Información</h5>
                <p>Este panel te permite acceder rápidamente a tu router Tenda y monitorear su estado.</p>
            </div>
        </div>

    </div>

</div>

<script>

const routerIP = "192.168.1.67";

function checkStatus() {
    fetch(`http://${routerIP}`)
    .then(() => {
        document.getElementById("estado").innerHTML = "🟢 En línea";
        document.getElementById("estado").className = "status online";
    })
    .catch(() => {
        document.getElementById("estado").innerHTML = "🔴 Sin conexión";
        document.getElementById("estado").className = "status offline";
    });
}

function openRouter() {
    window.open(`http://${routerIP}`, "_blank");
}

function restartRouter() {
    alert("⚠️ Para reiniciar necesitas acceso interno del router (API)");
}

</script>

</body>
</html>
