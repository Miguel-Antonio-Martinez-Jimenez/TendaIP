<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Tenda Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: #111827;
    border-bottom: 2px solid #0d6efd;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(13,110,253,0.15);
}

.btn-blue {
    background: #0d6efd;
    color: white;
    border: none;
    transition: 0.3s;
}

.btn-blue:hover {
    background: #0b5ed7;
    transform: scale(1.03);
}

.status {
    font-weight: bold;
    font-size: 18px;
}

.online {
    color: #00ff9c;
}

.offline {
    color: #ff4d4d;
}

.glow {
    text-shadow: 0 0 10px #0d6efd;
}
</style>

</head>
<body>

<nav class="navbar p-3">
    <div class="container-fluid">
        <h4 class="text-primary glow">⚡ Panel Router Tenda</h4>
    </div>
</nav>

<div class="container mt-4">

    <div class="row g-4">

        <!-- Estado -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>🌐 Estado de Red</h5>
                <p><strong>Red esperada:</strong> Tienda</p>
                <p><strong>Router IP:</strong> 192.168.1.67</p>

                <p id="estado" class="status">Verificando...</p>

                <button class="btn btn-blue w-100" onclick="checkStatus()">
                    🔍 Verificar conexión
                </button>
            </div>
        </div>

        <!-- Acciones -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>⚙️ Acciones</h5>

                <button class="btn btn-blue w-100 mb-2" onclick="openRouter()">
                    🔗 Abrir Router
                </button>

                <button class="btn btn-danger w-100 mb-2" onclick="pingRouter()">
                    📡 Ping Router
                </button>

                <button class="btn btn-warning w-100" onclick="restartRouter()">
                    ♻️ Reiniciar (simulado)
                </button>
            </div>
        </div>

        <!-- Info -->
        <div class="col-12">
            <div class="card p-4">
                <h5>📊 Información</h5>
                <p id="info">
                    Este panel detecta si estás conectado a la red <strong>Tienda</strong> 
                    verificando acceso al router.
                </p>
            </div>
        </div>

    </div>

</div>

<script>

const routerIP = "192.168.1.67";

// Detectar conexión automáticamente
function checkStatus() {
    const estado = document.getElementById("estado");

    fetch(`http://${routerIP}`, { mode: "no-cors" })
    .then(() => {
        estado.innerHTML = "🟢 Conectado a red Tienda";
        estado.className = "status online";
    })
    .catch(() => {
        estado.innerHTML = "🔴 No estás en la red Tienda";
        estado.className = "status offline";
    });
}

// Abrir router
function openRouter() {
    window.open(`http://${routerIP}`, "_blank");
}

// Simular ping
function pingRouter() {
    const estado = document.getElementById("estado");

    estado.innerHTML = "📡 Haciendo ping...";
    estado.className = "status";

    setTimeout(() => {
        estado.innerHTML = "🟢 Router responde correctamente";
        estado.className = "status online";
    }, 1500);
}

// Reinicio (simulado)
function restartRouter() {
    alert("⚠️ Para reiniciar el router necesitas acceso interno o backend");
}

// Auto check al cargar
window.onload = checkStatus;

</script>

</body>
</html>
