<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Tenda PRO+</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
}

.navbar {
    background: #111827;
    border-bottom: 2px solid #0d6efd;
}

.card {
    background: #111827;
    border-radius: 15px;
    border: 1px solid #1f2937;
    box-shadow: 0 0 20px rgba(13,110,253,0.15);
}

.btn-blue {
    background: #0d6efd;
    color: white;
    border: none;
}

.btn-blue:hover {
    background: #0b5ed7;
}

.status {
    font-size: 18px;
    font-weight: bold;
}

.online { color: #00ff9c; }
.offline { color: #ff4d4d; }

.table-dark {
    background: #0f172a;
}
</style>

</head>
<body>

<nav class="navbar p-3">
    <div class="container-fluid">
        <h4 class="text-primary">⚡ Panel Tenda PRO+</h4>
    </div>
</nav>

<div class="container mt-4">

    <div class="row g-4">

        <!-- Estado -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>🌐 Estado de Red</h5>
                <p><strong>Red:</strong> Tienda</p>
                <p><strong>IP Router:</strong> 192.168.1.67</p>

                <p id="estado" class="status">Verificando...</p>

                <button class="btn btn-blue w-100" onclick="checkStatus()">
                    Verificar conexión
                </button>
            </div>
        </div>

        <!-- Acciones -->
        <div class="col-md-6">
            <div class="card p-4">
                <h5>⚙️ Acciones</h5>

                <button class="btn btn-blue w-100 mb-2" onclick="openRouter()">
                    Abrir Router
                </button>

                <button class="btn btn-warning w-100 mb-2" onclick="scanDevices()">
                    Escanear dispositivos
                </button>

                <button class="btn btn-danger w-100" onclick="alert('Requiere acceso interno del router')">
                    Reiniciar Router
                </button>
            </div>
        </div>

        <!-- Dispositivos -->
        <div class="col-12">
            <div class="card p-4">
                <h5>📡 Dispositivos conectados</h5>

                <table class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Dispositivo</th>
                            <th>IP</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="devicesTable">
                        <tr>
                            <td colspan="4">No escaneado</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>

</div>

<script>

const routerIP = "192.168.1.67";

// Verificar conexión
function checkStatus() {
    const estado = document.getElementById("estado");

    fetch(`http://${routerIP}`, { mode: "no-cors" })
    .then(() => {
        estado.innerHTML = "🟢 Conectado a red Tienda";
        estado.className = "status online";
    })
    .catch(() => {
        estado.innerHTML = "🔴 No estás en la red";
        estado.className = "status offline";
    });
}

// Abrir router
function openRouter() {
    window.open(`http://${routerIP}`, "_blank");
}

// Simulación de escaneo
function scanDevices() {
    const table = document.getElementById("devicesTable");

    table.innerHTML = `
        <tr><td colspan="4">Escaneando red...</td></tr>
    `;

    setTimeout(() => {
        table.innerHTML = `
            <tr>
                <td>1</td>
                <td>📱 Celular</td>
                <td>192.168.1.10</td>
                <td class="online">Activo</td>
            </tr>
            <tr>
                <td>2</td>
                <td>💻 Laptop</td>
                <td>192.168.1.15</td>
                <td class="online">Activo</td>
            </tr>
            <tr>
                <td>3</td>
                <td>📺 Smart TV</td>
                <td>192.168.1.20</td>
                <td class="offline">Inactivo</td>
            </tr>
        `;
    }, 2000);
}

// Auto detectar al cargar
window.onload = checkStatus;

</script>

</body>
</html>
