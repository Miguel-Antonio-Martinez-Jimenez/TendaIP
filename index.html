<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Router Tenda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0a0a0a;
      color: white;
    }
    .card {
      background-color: #111;
      border: 1px solid #0d6efd;
    }
    .btn-custom {
      background-color: #0d6efd;
      color: white;
    }
    .btn-custom:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center text-primary">Panel Router Tenda</h2>

  <div class="card p-4 mt-4">
    <h5>Conexión al Router</h5>
    <input type="text" id="ip" class="form-control mb-3" value="192.168.1.67">

    <button class="btn btn-custom w-100" onclick="probarConexion()">
      Probar conexión
    </button>

    <div id="resultado" class="mt-3"></div>
  </div>

  <div class="card p-4 mt-4">
    <h5>Acciones rápidas</h5>

    <button class="btn btn-custom w-100 mb-2" onclick="abrirRouter()">
      Abrir panel Tenda
    </button>

    <button class="btn btn-danger w-100" onclick="reiniciarRouter()">
      Reiniciar Router
    </button>
  </div>
</div>

<script>
function probarConexion() {
  let ip = document.getElementById("ip").value;

  fetch(`http://${ip}`)
    .then(res => {
      document.getElementById("resultado").innerHTML =
        "<span class='text-success'>Router accesible</span>";
    })
    .catch(err => {
      document.getElementById("resultado").innerHTML =
        "<span class='text-danger'>No se pudo conectar</span>";
    });
}

function abrirRouter() {
  let ip = document.getElementById("ip").value;
  window.open(`http://${ip}`, "_blank");
}

function reiniciarRouter() {
  alert("⚠️ Esto normalmente requiere API del router (no siempre permitido)");
}
</script>

</body>
</html>
